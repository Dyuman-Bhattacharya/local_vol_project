<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .bg { fill: #f6f3ed; }
      .card { fill: #fffdf8; stroke: #25313b; stroke-width: 2; rx: 18; ry: 18; }
      .title { font: 700 34px Georgia, serif; fill: #182028; }
      .subtitle { font: 600 18px Georgia, serif; fill: #344250; }
      .label { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #182028; }
      .body { font: 15px 'Segoe UI', Arial, sans-serif; fill: #465360; }
      .arrow { stroke: #6f7f8c; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .accent1 { fill: #d9e8f4; }
      .accent2 { fill: #f2dfc2; }
      .accent3 { fill: #d6eadf; }
      .accent4 { fill: #efd9d7; }
      .accent5 { fill: #e6def5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6f7f8c"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="520"/>
  <text class="title" x="60" y="64">Local Vol Project Architecture</text>
  <text class="subtitle" x="60" y="96">From listed SPY option chains to arbitrage-free surfaces, Dupire local vol, pricing, and hedging.</text>

  <g transform="translate(60,150)">
    <rect class="card accent1" x="0" y="0" width="190" height="150" rx="18" ry="18"/>
    <text class="label" x="20" y="36">1. Daily Data</text>
    <text class="body" x="20" y="66">15:45 ET snapshot</text>
    <text class="body" x="20" y="89">raw archive + panel append</text>
    <text class="body" x="20" y="112">stable listed contracts</text>
  </g>

  <g transform="translate(280,150)">
    <rect class="card accent2" x="0" y="0" width="190" height="150" rx="18" ry="18"/>
    <text class="label" x="20" y="36">2. Cleaning</text>
    <text class="body" x="20" y="66">schema normalization</text>
    <text class="body" x="20" y="89">quote validation</text>
    <text class="body" x="20" y="112">spread / liquidity filters</text>
  </g>

  <g transform="translate(500,150)">
    <rect class="card accent3" x="0" y="0" width="220" height="150" rx="18" ry="18"/>
    <text class="label" x="20" y="36">3. IV Surface</text>
    <text class="body" x="20" y="66">Black-Scholes IV inversion</text>
    <text class="body" x="20" y="89">Interpolated total variance + projection</text>
    <text class="body" x="20" y="112">calendar / butterfly repair</text>
  </g>

  <g transform="translate(760,150)">
    <rect class="card accent4" x="0" y="0" width="180" height="150" rx="18" ry="18"/>
    <text class="label" x="20" y="36">4. Local Vol</text>
    <text class="body" x="20" y="66">Dupire extraction</text>
    <text class="body" x="20" y="89">regularization</text>
    <text class="body" x="20" y="112">surface diagnostics</text>
  </g>

  <g transform="translate(980,150)">
    <rect class="card accent5" x="0" y="0" width="160" height="150" rx="18" ry="18"/>
    <text class="label" x="20" y="36">5. Evaluation</text>
    <text class="body" x="20" y="66">PDE pricing</text>
    <text class="body" x="20" y="89">Monte Carlo</text>
    <text class="body" x="20" y="112">BS vs LV hedging</text>
  </g>

  <path class="arrow" d="M250 225 H280"/>
  <path class="arrow" d="M470 225 H500"/>
  <path class="arrow" d="M720 225 H760"/>
  <path class="arrow" d="M940 225 H980"/>

  <g transform="translate(255,360)">
    <rect class="card" x="0" y="0" width="690" height="96" rx="18" ry="18"/>
    <text class="label" x="26" y="36">Canonical Real-Data Workflow</text>
    <text class="body" x="26" y="64">Collect a daily dated option panel, calibrate an arbitrage-free surface on each trade date, derive daily local vol, and compare BS vs Local Vol on the same fixed listed contracts with common market entry premiums and explicit transaction costs.</text>
  </g>
</svg>

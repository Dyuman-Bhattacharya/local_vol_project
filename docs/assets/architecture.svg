<svg xmlns="http://www.w3.org/2000/svg" width="860" height="1400" viewBox="0 0 860 1400">
  <defs>
    <style>
      .bg { fill: #f6f3ed; }
      .panel { fill: #fffdf8; stroke: #25313b; stroke-width: 2; rx: 22; ry: 22; }
      .title { font: 700 34px Georgia, serif; fill: #182028; }
      .subtitle { font: 600 17px Georgia, serif; fill: #344250; }
      .step-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #182028; }
      .step-body { font: 16px 'Segoe UI', Arial, sans-serif; fill: #42515d; }
      .summary-title { font: 700 23px 'Segoe UI', Arial, sans-serif; fill: #182028; }
      .summary-body { font: 16px 'Segoe UI', Arial, sans-serif; fill: #42515d; }
      .arrow { stroke: #6f7f8c; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .a1 { fill: #d9e8f4; }
      .a2 { fill: #f2dfc2; }
      .a3 { fill: #d6eadf; }
      .a4 { fill: #efd9d7; }
      .a5 { fill: #e6def5; }
      .summary { fill: #fffaf0; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6f7f8c" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="860" height="1400" />

  <text class="title" x="430" y="70" text-anchor="middle">Local Vol Project Architecture</text>
  <text class="subtitle" x="430" y="104" text-anchor="middle">
    <tspan x="430" dy="0">Daily SPY options to arbitrage-free surfaces</tspan>
    <tspan x="430" dy="22">and local-vol pricing diagnostics</tspan>
  </text>

  <g transform="translate(90,150)">
    <rect class="panel a1" x="0" y="0" width="680" height="140" />
    <text class="step-title" x="28" y="42">1. Daily Data</text>
    <text class="step-body" x="28" y="78">
      <tspan x="28" dy="0">Theta snapshot at 15:45 ET</tspan>
      <tspan x="28" dy="26">raw archive and dated panel append</tspan>
      <tspan x="28" dy="26">listed contracts tracked through time</tspan>
    </text>
  </g>

  <path class="arrow" d="M430 290 V340" />

  <g transform="translate(90,340)">
    <rect class="panel a2" x="0" y="0" width="680" height="140" />
    <text class="step-title" x="28" y="42">2. Quote Conditioning</text>
    <text class="step-body" x="28" y="78">
      <tspan x="28" dy="0">schema normalization and validation</tspan>
      <tspan x="28" dy="26">spot and carry inputs</tspan>
      <tspan x="28" dy="26">liquidity and spread filters</tspan>
    </text>
  </g>

  <path class="arrow" d="M430 480 V530" />

  <g transform="translate(90,530)">
    <rect class="panel a3" x="0" y="0" width="680" height="170" />
    <text class="step-title" x="28" y="42">3. Surface Construction</text>
    <text class="step-body" x="28" y="78">
      <tspan x="28" dy="0">merge OTM puts and OTM calls into synthetic calls</tspan>
      <tspan x="28" dy="26">interpolate total variance across strike and maturity</tspan>
      <tspan x="28" dy="26">project the call grid onto the static no-arbitrage set</tspan>
      <tspan x="28" dy="26">export an arbitrage-free implied-volatility surface</tspan>
    </text>
  </g>

  <path class="arrow" d="M430 700 V750" />

  <g transform="translate(90,750)">
    <rect class="panel a4" x="0" y="0" width="680" height="150" />
    <text class="step-title" x="28" y="42">4. Local Volatility</text>
    <text class="step-body" x="28" y="78">
      <tspan x="28" dy="0">derive Dupire local volatility from the repaired surface</tspan>
      <tspan x="28" dy="26">regularize noisy regions</tspan>
      <tspan x="28" dy="26">track trusted and weak domains explicitly</tspan>
    </text>
  </g>

  <path class="arrow" d="M430 900 V950" />

  <g transform="translate(90,950)">
    <rect class="panel a5" x="0" y="0" width="680" height="170" />
    <text class="step-title" x="28" y="42">5. Pricing and Evaluation</text>
    <text class="step-body" x="28" y="78">
      <tspan x="28" dy="0">price with Crank-Nicolson PDE and Monte Carlo</tspan>
      <tspan x="28" dy="26">reprice listed vanillas and inspect diagnostics</tspan>
      <tspan x="28" dy="26">compare Black-Scholes and Local Vol hedging</tspan>
      <tspan x="28" dy="26">include common entry premiums and transaction costs</tspan>
    </text>
  </g>

  <path class="arrow" d="M430 1120 V1170" />

  <g transform="translate(90,1170)">
    <rect class="panel summary" x="0" y="0" width="680" height="150" />
    <text class="summary-title" x="28" y="42">Canonical workflow</text>
    <text class="summary-body" x="28" y="78">
      <tspan x="28" dy="0">Collect a dated SPY option panel, recalibrate the surface each day,</tspan>
      <tspan x="28" dy="26">derive local volatility from the repaired call grid, and compare</tspan>
      <tspan x="28" dy="26">Black-Scholes and Local Vol on the same fixed listed contracts.</tspan>
    </text>
  </g>
</svg>
